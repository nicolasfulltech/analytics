name: bench

# Benchmark smoke test — runs the criterion suite with a short sample budget
# to catch regressions in the hot paths without hogging CI minutes. The full
# measurement run is still `cargo bench --bench *` locally on real hardware.

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: bench (quick)
        # --quick is criterion's early-stop flag, passed after `--`. Each
        # bench target has to be named explicitly because cargo bench would
        # otherwise also run the lib unittest harness, which doesn't know
        # the flag and exits non-zero.
        run: cargo bench --bench ingest --bench queries -- --quick
